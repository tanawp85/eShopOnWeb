name: Container Workflow
on: [workflow_dispatch]

env:
  ACR_LOGIN_SERVER: aistraining.azurecr.io
  TAG_NAME: eshoponweb-webapp-tanawith:1.0.0
  IMAGE_NAME: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.TAG_NAME }}
  RESOURCE_GROUP: ais-training
  CLUSTER_NAME: aks-demo

jobs:
  build-continaer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: ACR Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push Docker Image
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}

  deploy-to-aks:
    runs-on: ubuntu-latest
    # needs: build-continaer
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Set AKS context
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          resource-group: ${{ env.RESOURCE_GROUP }}
      - name: Deploy to AKS
        uses: azure/k8s-deploy@v3
        with:
          manifests: |
            .k8s/deployment.yaml
            .k8s/service.yaml
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}
